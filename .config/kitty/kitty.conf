#
# Kitty config file
#

#
# COLORS
#

background #0F0B15
background_opacity 0.8
foreground #EBF8FF

# Black
color0 #0F0B14
color8 #00020C

# Red
color1 #D25751
color9 #560A18

# Green
color2 #7CE870
color10 #084424

# Yellow
color3 #F6EC60
color11 #6C5B2C

# Blue
color4 #76B2E9
color12 #103049

# Magenta
color5 #B72AC4
color13 #320F4A

# Cyan
color6 #53D5BF
color14 #104430

# White
color7 #EBF8FF
color15 #9CA8C7

# 
# FONT
#

font_family MononokiNerdFont

#
# CURSOR
#

cursor_text_color #00020C
cursor_shape beam
cursor_shape_unfocused unchanged
cursor_blink_interval 0.5 ease-in-out
cursor_trail 1

#
# KEYBINDS
#

# Copy & Paste
# REMAKE THIS KEYBIND
# map cmd+c copy_or_noop
# map cmd+v paste_from_clipboard

# Scrolling
map shift+up scroll_line_up
map shift+down scroll_line_down
map ctrl+up scroll_page_up
map ctrl+down scroll_page_down

# Tabs
map ctrl+t new_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+w close_tab
map ctrl+n set_tab_title
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4

#
# TABS VISUALS
#

tab_bar_edge top
tab_bar_margin_width 0
tab_bar_margin_height 0 5
tab_bar_align left
tab_bar_style powerline
active_tab_foreground #EBF8FF
active_tab_background #B72AC4
active_tab_font_style bold
inactive_tab_background #360437
inactive_tab_foreground #EBF8FF

#
# Kitty config file
#

#
# COLORS
#

background #0e0a2e
background_opacity 0.8
foreground #fffdeb

# Black
color0 #0e0a2f
color8 #0e0a2f

# Red
color1 #fd75ca
color9 #d53c6a

# Green
color2 #60ff64
color10 #22c278

# Yellow
color3 #fffcc8
color11 #ffc587

# Blue
color4 #5fc5ff
color12 #3f7de0

# Magenta
color5 #b295ff
color13 #924fdc

# Cyan
color6 #5efdf7
color14 #4593a5

# White
color7 #fffdeb
color15 #fffdeb

# 
# FONT
#

font_family MononokiNerdFont

#
# CURSOR
#

cursor_text_color #fffdeb
cursor_shape beam
cursor_shape_unfocused unchanged
cursor_blink_interval 0.5 ease-in-out
cursor_trail 1

#
# KEYBINDS
#

# Copy & Paste
# REMAKE THIS KEYBIND
# map cmd+c copy_or_noop
# map cmd+v paste_from_clipboard

# Scrolling
map shift+up scroll_line_up
map shift+down scroll_line_down
map ctrl+up scroll_page_up
map ctrl+down scroll_page_down

# Tabs
map ctrl+t new_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+w close_tab
map ctrl+n set_tab_title
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4

#
# TABS VISUALS
#

tab_bar_edge top
tab_bar_margin_width 0
tab_bar_margin_height 0 5
tab_bar_align left
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground #fffdeb
active_tab_background #924fdc
active_tab_font_style bold
inactive_tab_background #0e0a2e
inactive_tab_foreground #fffdeb
